name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src tests examples

      - name: Architecture pressure
        run: uv run python scripts/architecture_pressure.py --json

      - name: Test
        run: uv run pytest -q

      - name: Build
        run: uv build

      - name: Check built artifacts
        run: uv run python scripts/check_dist_artifacts.py

      - name: Wheel smoke test
        run: uv run python scripts/wheel_smoke.py

      - name: TurboPuffer extra wheel smoke test
        run: |
          python -m venv .wheel-smoke-turbopuffer
          . .wheel-smoke-turbopuffer/bin/activate
          wheel="$(ls dist/*.whl)"
          pip install "${wheel}[turbopuffer]"
          python -c "import turbopuffer; from rag_core.search.providers import TurboPufferVectorStore"
          rag-core doctor --vector-store turbopuffer --turbopuffer-namespace ci-docs --json
