name: release-artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --group dev

      - name: Quick landing gate
        run: ./scripts/landing_check.sh --quick

      - name: Optional integration smoke
        run: ./scripts/verify_optional_integrations.sh

      - name: Build artifacts
        run: uv build

      - name: Check built artifacts
        run: uv run python scripts/check_dist_artifacts.py

      - name: Wheel smoke test
        run: uv run python scripts/wheel_smoke.py

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v6
        with:
          name: rag-core-dist
          path: dist/*
