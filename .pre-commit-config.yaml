repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy src tests examples
        language: system
        pass_filenames: false
      - id: pytest-fast
        name: pytest (fast tier)
        entry: uv run pytest -q -m "not live and not eval and not eval_harness and not provider_contract and not integration"
        language: system
        pass_filenames: false
        stages: [pre-push]
