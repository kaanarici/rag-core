openapi: 3.0.3
info:
  title: rag-core serve
  description: |
    Thin HTTP runtime over the same ``RAGCore`` library you embed in your app.
    v1 exposes health, runtime description, async ingest jobs, search, and
    retrieve-context only (no eval HTTP).

    Hit shapes follow [expectations.md](../expectations.md).
  version: 0.1.0
servers:
  - url: http://127.0.0.1:8787
    description: "Local ``rag-core serve`` default"
tags:
  - name: health
  - name: runtime
  - name: ingest
  - name: retrieval
paths:
  /health:
    get:
      tags: [health]
      summary: Liveness
      description: "Process is up. Does not initialize ``RAGCore`` or touch dependencies."
      operationId: getHealth
      responses:
        "200":
          description: Alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LivenessResponse"
  /health/ready:
    get:
      tags: [health]
      summary: Readiness
      description: |
        Initializes ``RAGCore`` if needed and reports vector-store health.
        Returns 503 when dependencies are not ready.
      operationId: getHealthReady
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: Not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /v1/runtime:
    get:
      tags: [runtime]
      summary: Runtime description
      operationId: getRuntime
      responses:
        "200":
          description: "``describe_runtime()`` payload"
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/ingest:
    post:
      tags: [ingest]
      summary: Start ingest job
      operationId: createIngestJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestRequest"
      responses:
        "202":
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJobCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
  /v1/ingest/{job_id}:
    get:
      tags: [ingest]
      summary: Ingest job status
      operationId: getIngestJob
      parameters:
        - name: job_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestJobStatus"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/search:
    post:
      tags: [retrieval]
      summary: Search (scored chunk hits)
      operationId: search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchEndpointRequest"
      responses:
        "200":
          description: Hit list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchHit"
        "400":
          $ref: "#/components/responses/BadRequest"
  /v1/retrieve-context:
    post:
      tags: [retrieval]
      summary: Context pack with prompt-safe text
      operationId: retrieveContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContextRetrievalRequest"
      responses:
        "200":
          description: "App-facing context pack plus prompt-safe ``context_text``"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContextPackResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
components:
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - invalid_json
                - invalid_request
                - not_found
                - http_error
                - internal_error
            message:
              type: string
            details:
              type: object
              additionalProperties: true
    LivenessResponse:
      type: object
      required: [ok, status, live]
      properties:
        ok:
          type: boolean
        status:
          type: string
          enum: [ok]
        live:
          type: boolean
    ReadinessResponse:
      type: object
      required: [ok, status, ready, live, checks]
      properties:
        ok:
          type: boolean
        status:
          type: string
          enum: [ok, degraded]
        ready:
          type: boolean
        live:
          type: boolean
        checks:
          type: object
          additionalProperties: true
    IngestRequest:
      type: object
      additionalProperties: false
      required: [path, namespace, corpus_id]
      properties:
        path:
          type: string
          minLength: 1
          pattern: "\\S"
          description: Existing absolute or relative path under a configured server ingest root
        namespace:
          type: string
          minLength: 1
          pattern: "\\S"
        corpus_id:
          type: string
          minLength: 1
          pattern: "\\S"
    IngestJobCreated:
      type: object
      required: [job_id, status]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
    IngestJobStatus:
      type: object
      required: [job_id, status, path, namespace, corpus_id]
      properties:
        job_id:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        path:
          type: string
        namespace:
          type: string
        corpus_id:
          type: string
        result:
          type: object
          additionalProperties: true
        error:
          type: string
          description: "Present when ``status`` is ``failed`` (exception type name)"
    SearchEndpointRequest:
      type: object
      additionalProperties: false
      required: [query, namespace, corpus_ids]
      properties:
        query:
          type: string
          minLength: 1
          pattern: "\\S"
        namespace:
          type: string
          minLength: 1
          pattern: "\\S"
        corpus_ids:
          type: array
          items:
            type: string
            minLength: 1
            pattern: "\\S"
        limit:
          type: integer
          minimum: 1
          default: 10
        content_types:
          type: array
          description: Optional content types inside the app-bound namespace and corpus scope
          items:
            type: string
            minLength: 1
            pattern: "\\S"
        document_ids:
          type: array
          description: Optional document IDs inside the app-bound namespace and corpus scope
          items:
            type: string
            minLength: 1
            pattern: "\\S"
        rerank:
          type: boolean
          default: false
        use_lexical_search:
          type: boolean
          default: true
          description: Controls configured lexical/exact-match expansion only; query-plan defaults remain provider capability-aware.
    ContextRetrievalRequest:
      type: object
      additionalProperties: false
      required: [query, namespace, corpus_ids]
      properties:
        query:
          type: string
          minLength: 1
          pattern: "\\S"
        namespace:
          type: string
          minLength: 1
          pattern: "\\S"
        corpus_ids:
          type: array
          items:
            type: string
            minLength: 1
            pattern: "\\S"
        limit:
          type: integer
          minimum: 1
          default: 8
        content_types:
          type: array
          description: Optional content types inside the app-bound namespace and corpus scope
          items:
            type: string
            minLength: 1
            pattern: "\\S"
        document_ids:
          type: array
          description: Optional document IDs inside the app-bound namespace and corpus scope
          items:
            type: string
            minLength: 1
            pattern: "\\S"
        rerank:
          type: boolean
          default: false
        use_lexical_search:
          type: boolean
          default: true
          description: Controls configured lexical/exact-match expansion only; query-plan defaults remain provider capability-aware.
        max_chars:
          type: integer
          minimum: 1
          description: Optional character budget for prompt-safe context text
        max_tokens:
          type: integer
          minimum: 1
          description: Optional token budget for prompt-safe context text
    SearchHit:
      type: object
      required: [id, text, score, content_type, source_type]
      properties:
        id:
          type: string
        text:
          type: string
        score:
          type: number
        content_type:
          type: string
        source_type:
          type: string
        document_id:
          type: string
        corpus_id:
          type: string
        document_key:
          type: string
        title:
          type: string
        chunk_index:
          type: integer
        metadata:
          type: object
          additionalProperties: true
      additionalProperties: true
    ContextPackResponse:
      type: object
      required:
        - query
        - context_text
        - snippets
        - citations
        - source_previews
        - citation_summary
        - dropped_count
        - max_snippets
        - max_chars
        - max_tokens
        - token_estimate
        - char_count
        - truncated
      properties:
        query:
          type: string
        context_text:
          type: string
          description: "Prompt-safe text from ``ContextPack.as_prompt_text()``"
        snippets:
          type: array
          description: App-facing context snippets from ``ContextPack.to_payload()``
          items:
            type: object
            additionalProperties: true
        citations:
          type: array
          description: App-facing source references from ``ContextPack.to_payload()``
          items:
            type: object
            additionalProperties: true
        source_previews:
          type: array
          description: App-facing source previews from ``ContextPack.to_payload()``
          items:
            type: object
            additionalProperties: true
        citation_summary:
          type: string
          description: App-facing citation summary from ``ContextPack.to_payload()``
        dropped_count:
          type: integer
          minimum: 0
        max_snippets:
          type: integer
          minimum: 1
        max_chars:
          type: integer
          nullable: true
        max_tokens:
          type: integer
          nullable: true
        token_estimate:
          type: integer
          minimum: 0
        char_count:
          type: integer
          minimum: 0
          description: App-facing rendered context length from ``ContextPack.to_payload()``, not the length of ``context_text``
        truncated:
          type: boolean
      additionalProperties: true
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
