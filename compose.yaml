# Self-host: Qdrant + rag-core serve (Journey C2).
#   docker compose up -d --build
#   curl -s http://127.0.0.1:8787/health/ready
# See docs/self-host.md.
services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  serve:
    build: .
    ports:
      - "8787:8787"
    environment:
      RAG_CORE_QDRANT_URL: http://qdrant:6333
      RAG_CORE_QDRANT_COLLECTION: rag_core_self_host
      RAG_CORE_EMBEDDING_PROVIDER: demo
      RAG_CORE_EMBEDDING_MODEL: demo-dense-v1
      RAG_CORE_EMBEDDING_DIMENSIONS: "64"
    command:
      - rag-core
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "8787"
      - --ingest-root
      - /app/examples/demo_corpus
      - --qdrant-url
      - http://qdrant:6333
      - --qdrant-collection
      - rag_core_self_host
      - --embedding-provider
      - demo
      - --embedding-model
      - demo-dense-v1
      - --embedding-dimensions
      - "64"
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-sf",
          "http://127.0.0.1:8787/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  qdrant_storage:
